{% extends "base.html" %}
{% block title %}Profile{% endblock %}

{% block content %}
<h2>Profile</h2>

{% if saved %}
<p>Saved ✓</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Full name">
    <input type="email" name="email" placeholder="Email">
    <textarea name="about" rows="4"></textarea>
    <button type="submit">Save</button>
</form>
{% endblock %}
