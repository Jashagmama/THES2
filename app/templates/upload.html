{% extends "base.html" %}
{% block content %}

<h2>Upload & Results</h2>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <input type="file" name="image" accept="image/*">
  <button type="submit">Upload</button>
</form>

{% if input_path %}
<p>Input: {{ input_path }}</p>
<img src="/{{ input_path }}">
<p>Result: {{ output_path }}</p>
<img src="/{{ output_path }}">
{% endif %}

{% endblock %}
